name: Scrape TikTok User Video IDs

on:
  workflow_dispatch:
    inputs:
      username:
        description: "TikTok username without @"
        required: true
        type: string
      number:
        description: "Number of videos to scrape"
        required: false
        default: "100"
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tiktok-scraper
        run: |
          npm install -g tiktok-scraper

      - name: Prepare output directory
        run: |
          rm -rf output
          mkdir -p output

      - name: Scrape TikTok user metadata
        run: |
          USERNAME="${{ github.event.inputs.username }}"
          NUMBER="${{ github.event.inputs.number }}"

          echo "Scraping TikTok user: $USERNAME"
          echo "Number of videos requested: $NUMBER"

          tiktok-scraper user "$USERNAME" \
            --number "$NUMBER" \
            --filetype json \
            --filepath ./output \
            --filename "${USERNAME}_posts"

      - name: Debug - Show generated files
        run: |
          echo "Current directory:"
          pwd

          echo "Repository root:"
          ls -la

          echo "Output directory:"
          ls -la output || true

          echo "Searching for JSON files anywhere in repository:"
          find . -type f -name "*.json" -print

      - name: Verify scraper produced JSON
        run: |
          JSON_COUNT=$(find output -type f -name "*.json" | wc -l)

          echo "JSON files found in output/: $JSON_COUNT"

          if [ "$JSON_COUNT" -eq 0 ]; then
            echo "No JSON files were created by tiktok-scraper."
            echo "This usually means one of these happened:"
            echo "1. TikTok blocked the GitHub Actions runner."
            echo "2. The username is incorrect or private."
            echo "3. tiktok-scraper is outdated/broken."
            echo "4. The scraper command produced no result."
            exit 1
          fi

      - name: Extract video IDs
        run: |
          node scripts/extract-video-ids.js "${{ github.event.inputs.username }}"

      - name: Commit and push results
        run: |
          USERNAME="${{ github.event.inputs.username }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TikTok video IDs for ${USERNAME}"
            git push
          fi
