name: Scrape TikTok User Video IDs

on:
  workflow_dispatch:
    inputs:
      username:
        description: "TikTok username without @"
        required: true
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tiktok-scraper
        run: |
          npm install -g tiktok-scraper

      - name: Prepare output directory
        run: |
          mkdir -p output

      - name: Scrape TikTok user metadata
        run: |
          USERNAME="${{ github.event.inputs.username }}"
          echo "Scraping TikTok user: $USERNAME"

          # We use --filename to try and force a consistent name, 
          # but the script is now smart enough to find it regardless.
          tiktok-scraper user "$USERNAME" \
            --number 0 \
            --filetype json \
            --filepath ./output \
            --filename "${USERNAME}_posts"

      - name: Debug - List generated files
        run: |
          echo "Checking directory: $(pwd)"
          echo "Listing repository root:"
          ls -la
          echo "Listing output directory:"
          ls -la output || echo "Output directory is empty or does not exist."

      - name: Extract video IDs
        run: |
          # This runs your scripts/extract-video-ids.js file
          node scripts/extract-video-ids.js "${{ github.event.inputs.username }}"

      - name: Commit and push results
        run: |
          USERNAME="${{ github.event.inputs.username }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add the entire output folder
          git add output/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TikTok data for ${USERNAME}"
            git push
          fi
