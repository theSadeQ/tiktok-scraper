name: Scrape TikTok User Video IDs

on:
  workflow_dispatch:
    inputs:
      username:
        description: "TikTok username without @"
        required: true
        type: string
      number:
        description: "Number of videos to scrape"
        required: false
        default: "30"
        type: string

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g tiktok-scraper
          node --version
          npm --version
          tiktok-scraper --version || true

      - name: Prepare output directory
        run: |
          rm -rf output
          mkdir -p output

      - name: Run TikTok scraper
        run: |
          set -euxo pipefail

          USERNAME="${{ github.event.inputs.username }}"
          NUMBER="${{ github.event.inputs.number }}"

          echo "Username: $USERNAME"
          echo "Number: $NUMBER"
          echo "Working directory: $(pwd)"

          tiktok-scraper user "$USERNAME" \
            --number "$NUMBER" \
            --filetype json \
            --filepath ./output \
            --filename "${USERNAME}_posts"

      - name: Debug files after scraping
        if: always()
        run: |
          echo "Repository root:"
          ls -la

          echo ""
          echo "Output directory:"
          ls -la output || true

          echo ""
          echo "All JSON files in repository:"
          find . -type f -name "*.json" -print || true

          echo ""
          echo "All files in repository up to depth 3:"
          find . -maxdepth 3 -type f | sort || true

      - name: Verify scraper produced JSON
        run: |
          OUTPUT_JSON_COUNT=$(find output -type f -name "*.json" | wc -l)
          ANY_JSON_COUNT=$(find . -type f -name "*.json" | wc -l)

          echo "JSON files found in output/: $OUTPUT_JSON_COUNT"
          echo "JSON files found anywhere: $ANY_JSON_COUNT"

          if [ "$OUTPUT_JSON_COUNT" -eq 0 ]; then
            echo "No JSON files were created in output/."
            echo "Possible causes:"
            echo "1. TikTok blocked the GitHub runner"
            echo "2. Username is invalid or private"
            echo "3. tiktok-scraper failed"
            echo "4. scraper wrote files somewhere unexpected"
            exit 1
          fi

      - name: Extract video IDs
        run: |
          node scripts/extract-video-ids.js "${{ github.event.inputs.username }}"

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-output-${{ github.event.inputs.username }}
          path: |
            output
            *.json
          if-no-files-found: warn

      - name: Commit and push results
        run: |
          USERNAME="${{ github.event.inputs.username }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TikTok video IDs for ${USERNAME}"
            git push
          fi
