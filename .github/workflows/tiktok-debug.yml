name: TikTok Debug

on:
  workflow_dispatch:
    inputs:
      username:
        description: "TikTok username"
        required: true
        default: "lilkassb"
      count:
        description: "Number of videos to request"
        required: true
        default: "30"

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TIKTOK_USERNAME: ${{ inputs.username }}
      TIKTOK_COUNT: ${{ inputs.count }}
      OUTPUT_DIR: output
      DEBUG_DIR: debug-report

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run debug process
        shell: bash
        run: |
          set +e

          mkdir -p "$OUTPUT_DIR"
          mkdir -p "$DEBUG_DIR"

          STATUS_FILE="$DEBUG_DIR/status.txt"
          REPORT_FILE="$DEBUG_DIR/workflow-report.md"

          echo "0" > "$STATUS_FILE"

          {
            echo "# TikTok Debug Report"
            echo
            echo "## Basic Info"
            echo
            echo "- Username: \`$TIKTOK_USERNAME\`"
            echo "- Count: \`$TIKTOK_COUNT\`"
            echo "- Node: \`$(node --version)\`"
            echo "- npm: \`$(npm --version)\`"
            echo "- Working directory: \`$(pwd)\`"
            echo
          } > "$REPORT_FILE"

          echo "Repository files:"
          ls -la > "$DEBUG_DIR/root-files.txt" 2>&1

          echo "Checking collector file..."

          if [ ! -f "scripts/collect-tiktok-debug.js" ]; then
            echo "Missing scripts/collect-tiktok-debug.js" > "$DEBUG_DIR/error.txt"
            echo "1" > "$STATUS_FILE"

            {
              echo
              echo "## Error"
              echo
              echo "\`scripts/collect-tiktok-debug.js\` was not found."
            } >> "$REPORT_FILE"

            exit 0
          fi

          wc -l scripts/collect-tiktok-debug.js > "$DEBUG_DIR/collector-line-count.txt" 2>&1
          nl -ba scripts/collect-tiktok-debug.js > "$DEBUG_DIR/collector-source-numbered.txt" 2>&1

          echo "Running JS syntax check..."

          node --check scripts/collect-tiktok-debug.js \
            > "$DEBUG_DIR/node-check.stdout.txt" \
            2> "$DEBUG_DIR/node-check.stderr.txt"

          SYNTAX_CODE=$?

          {
            echo
            echo "## Syntax Check"
            echo
            echo "- Exit code: \`$SYNTAX_CODE\`"
          } >> "$REPORT_FILE"

          if [ "$SYNTAX_CODE" != "0" ]; then
            echo "JavaScript syntax check failed" > "$DEBUG_DIR/error.txt"
            echo "1" > "$STATUS_FILE"
            exit 0
          fi

          echo "Installing tiktok-scraper globally..."

          npm install -g tiktok-scraper \
            > "$DEBUG_DIR/npm-install.stdout.txt" \
            2> "$DEBUG_DIR/npm-install.stderr.txt"

          NPM_CODE=$?

          {
            echo
            echo "## npm Install"
            echo
            echo "- Exit code: \`$NPM_CODE\`"
          } >> "$REPORT_FILE"

          if [ "$NPM_CODE" != "0" ]; then
            echo "npm install -g tiktok-scraper failed" > "$DEBUG_DIR/error.txt"
            echo "1" > "$STATUS_FILE"
            exit 0
          fi

          echo "Checking tiktok-scraper command..."

          {
            echo "Command path:"
            command -v tiktok-scraper || true
            echo
            echo "Version:"
            tiktok-scraper --version || true
            echo
            echo "Help:"
            tiktok-scraper --help || true
          } > "$DEBUG_DIR/tiktok-scraper-info.txt" 2>&1

          echo "Running smoke test with public TikTok account..."

          mkdir -p smoke-output

          tiktok-scraper user tiktok -n 5 -t json -d smoke-output \
            > "$DEBUG_DIR/smoke-test.stdout.txt" \
            2> "$DEBUG_DIR/smoke-test.stderr.txt"

          SMOKE_CODE=$?

          find smoke-output -maxdepth 5 -type f -print \
            > "$DEBUG_DIR/smoke-output-files.txt" \
            2>&1

          SMOKE_JSON_COUNT=$(find smoke-output -type f -name "*.json" 2>/dev/null | wc -l | tr -d ' ')

          {
            echo
            echo "## Smoke Test"
            echo
            echo "- Account: \`tiktok\`"
            echo "- Exit code: \`$SMOKE_CODE\`"
            echo "- JSON files created: \`$SMOKE_JSON_COUNT\`"
          } >> "$REPORT_FILE"

          echo "Running your collector..."

          node scripts/collect-tiktok-debug.js \
            > "$DEBUG_DIR/collector.stdout.txt" \
            2> "$DEBUG_DIR/collector.stderr.txt"

          COLLECTOR_CODE=$?

          find "$OUTPUT_DIR" -maxdepth 5 -type f -print \
            > "$DEBUG_DIR/output-files.txt" \
            2>&1

          OUTPUT_JSON_COUNT=$(find "$OUTPUT_DIR" -type f -name "*.json" 2>/dev/null | wc -l | tr -d ' ')

          {
            echo
            echo "## Collector"
            echo
            echo "- Exit code: \`$COLLECTOR_CODE\`"
            echo "- JSON files created: \`$OUTPUT_JSON_COUNT\`"
          } >> "$REPORT_FILE"

          if [ "$COLLECTOR_CODE" != "0" ]; then
            echo "Collector failed with exit code $COLLECTOR_CODE" > "$DEBUG_DIR/error.txt"
            echo "1" > "$STATUS_FILE"
            exit 0
          fi

          if [ "$OUTPUT_JSON_COUNT" = "0" ]; then
            echo "Collector ran but produced no JSON files" > "$DEBUG_DIR/error.txt"
            echo "1" > "$STATUS_FILE"

            {
              echo
              echo "## Final Result"
              echo
              echo "Collector ran, but no JSON files were created."
              echo
              echo "This usually means either:"
              echo
              echo "1. TikTok blocked the scraper."
              echo "2. The target account has no accessible public videos."
              echo "3. The \`tiktok-scraper\` npm package is broken/outdated."
            } >> "$REPORT_FILE"

            exit 0
          fi

          {
            echo
            echo "## Final Result"
            echo
            echo "Success. JSON files were created."
          } >> "$REPORT_FILE"

          echo "0" > "$STATUS_FILE"
          exit 0

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-debug-artifacts
          path: |
            debug-report/**
            output/**
            smoke-output/**
            scripts/collect-tiktok-debug.js
          if-no-files-found: warn
          retention-days: 7

      - name: Fail job if debug failed
        if: always()
        shell: bash
        run: |
          if [ ! -f "debug-report/status.txt" ]; then
            echo "debug-report/status.txt missing"
            exit 1
          fi

          STATUS="$(cat debug-report/status.txt)"

          if [ "$STATUS" != "0" ]; then
            echo "TikTok debug failed."
            echo
            echo "Main error:"
            cat debug-report/error.txt || true
            echo
            echo "Artifacts were uploaded as: tiktok-debug-artifacts"
            echo "Download them and check debug-report/workflow-report.md"
            exit 1
          fi

          echo "TikTok debug passed."
