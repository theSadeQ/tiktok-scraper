name: TikTok Debug

on:
  workflow_dispatch:
    inputs:
      username:
        description: "TikTok username (without @)"
        required: true
        default: "tiktok"
      number:
        description: "Number of videos to scrape"
        required: true
        default: "30"

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show environment
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Runner: $(uname -a)"

      - name: Install TikTok scraper
        run: |
          npm install -g tiktok-scraper
          echo "tiktok-scraper version:"
          tiktok-scraper --version || true

      - name: Check collector syntax
        run: node --check scripts/collect-tiktok-debug.js

      - name: Run TikTok debug collector
        run: |
          node scripts/collect-tiktok-debug.js \
            "${{ github.event.inputs.username }}" \
            "${{ github.event.inputs.number }}"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-debug-artifacts
          path: |
            debug-report/
            output/
            scripts/collect-tiktok-debug.js
          if-no-files-found: warn
